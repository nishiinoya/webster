# Development stack — everything runs in containers.
#
#   docker compose up -d            # postgres + minio + api + web
#   open http://localhost:3000
#
# Auth0 build args come from the root .env file (gitignored). NEXT_PUBLIC_* are
# inlined at Next build time, so the `web` image must be rebuilt when you
# change any NEXT_PUBLIC_* value: `docker compose up -d --build web`.
#
# Stripe CLI is gated behind the `stripe` profile so it doesn't crash-loop
# without a key. Opt in when you need to forward webhooks locally:
#   docker compose --profile stripe up -d stripe-cli

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: webster
      POSTGRES_PASSWORD: webster
      POSTGRES_DB: webster
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webster"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/webster --ignore-existing
      "
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://webster:webster@postgres:5432/webster
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: webster
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_PRO_YEARLY: ${STRIPE_PRICE_PRO_YEARLY:-}
    command: sh -c "npx prisma migrate deploy && node dist/apps/api/src/main.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at build time. Falls back to the AUTH0_*
        # values when NEXT_PUBLIC_AUTH0_* aren't set, since they're the same
        # tenant in local dev.
        NEXT_PUBLIC_WEBSTER_API_URL: ${NEXT_PUBLIC_WEBSTER_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WEBSTER_WS_URL: ${NEXT_PUBLIC_WEBSTER_WS_URL:-http://localhost:4000}
        NEXT_PUBLIC_AUTH0_DOMAIN: ${NEXT_PUBLIC_AUTH0_DOMAIN:-${AUTH0_DOMAIN:-}}
        NEXT_PUBLIC_AUTH0_CLIENT_ID: ${NEXT_PUBLIC_AUTH0_CLIENT_ID:-}
        NEXT_PUBLIC_AUTH0_AUDIENCE: ${NEXT_PUBLIC_AUTH0_AUDIENCE:-${AUTH0_AUDIENCE:-}}
        NEXT_PUBLIC_AUTH0_REDIRECT_URI: ${NEXT_PUBLIC_AUTH0_REDIRECT_URI:-http://localhost:3000/callback}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  stripe-cli:
    profiles: ["stripe"]
    image: stripe/stripe-cli:latest
    command: listen --forward-to http://api:4000/api/subscriptions/webhook
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_DEVICE_NAME: webster-dev
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
