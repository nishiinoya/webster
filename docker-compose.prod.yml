# Production stack.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Differences from the dev docker-compose.yml:
#   - The web image is built with NEXT_PUBLIC_* baked in (Next.js inlines them
#     at build time), so the frontend ships pre-built and Auth0-wired.
#   - No stripe-cli: production uses a real webhook endpoint configured in the
#     Stripe dashboard (point it at https://<your-api-domain>/api/subscriptions/webhook
#     and put its signing secret in STRIPE_WEBHOOK_SECRET). Plan prices come from
#     the inline STRIPE_*_AMOUNT_CENTS vars below — no dashboard Product/Price.
#   - Postgres and MinIO are NOT exposed to the host. The API reaches them on
#     the internal network; assets/avatars are streamed through the API.
#   - All credentials come from .env.production (never commit it).

services:
  postgres:
    image: postgres:16
    # Bound to localhost only — reachable on the server (psql, backups) but
    # never exposed to the public internet.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    # Bound to localhost only — S3 API on 9000, console on 9001.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
        mc mb local/${S3_BUCKET} --ignore-existing
      "
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Inline plan definition — no Stripe Product/Price needs to exist; the API
      # passes price_data at checkout. These drive the displayed/charged amounts.
      STRIPE_PRODUCT_NAME: ${STRIPE_PRODUCT_NAME:-Webster Pro}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_MONTHLY_AMOUNT_CENTS: ${STRIPE_MONTHLY_AMOUNT_CENTS:-999}
      STRIPE_YEARLY_AMOUNT_CENTS: ${STRIPE_YEARLY_AMOUNT_CENTS:-9900}
    command: sh -c "npx prisma migrate deploy && node dist/apps/api/src/main.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_WEBSTER_API_URL: ${NEXT_PUBLIC_WEBSTER_API_URL}
        NEXT_PUBLIC_WEBSTER_WS_URL: ${NEXT_PUBLIC_WEBSTER_WS_URL}
        NEXT_PUBLIC_AUTH0_DOMAIN: ${NEXT_PUBLIC_AUTH0_DOMAIN}
        NEXT_PUBLIC_AUTH0_CLIENT_ID: ${NEXT_PUBLIC_AUTH0_CLIENT_ID}
        NEXT_PUBLIC_AUTH0_AUDIENCE: ${NEXT_PUBLIC_AUTH0_AUDIENCE}
        NEXT_PUBLIC_AUTH0_REDIRECT_URI: ${NEXT_PUBLIC_AUTH0_REDIRECT_URI}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
